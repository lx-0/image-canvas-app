<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Canvas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #e94560;
      letter-spacing: 0.5px;
    }

    #upload-form {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #file-input {
      font-size: 13px;
      color: #c0c0c0;
    }

    #file-input::file-selector-button {
      background: #0f3460;
      color: #e0e0e0;
      border: 1px solid #1a4a7a;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
    }

    #file-input::file-selector-button:hover {
      background: #1a4a7a;
    }

    button[type="submit"] {
      background: #e94560;
      color: #fff;
      border: none;
      padding: 7px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.2s;
    }

    button[type="submit"]:hover {
      background: #c73652;
    }

    #feedback {
      display: flex;
      gap: 16px;
      align-items: center;
      font-size: 13px;
      min-width: 0;
    }

    #status { color: #8a8a9a; }
    #error  { color: #e94560; }

    #canvas-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      min-height: 0;
      background: #12122a;
    }

    canvas {
      display: block;
      border-radius: 4px;
      background: #0e0e1a;
      box-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }

    #canvas-container.dragover {
      background: #1a1a3e;
      outline: 3px dashed #e94560;
      outline-offset: -8px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Image Canvas</h1>
    <form id="upload-form">
      <input type="file" id="file-input" accept="image/*" />
      <button type="submit">Upload</button>
    </form>
    <div id="feedback">
      <span id="status"></span>
      <span id="error"></span>
    </div>
  </header>

  <div id="canvas-container">
    <canvas id="canvas"></canvas>
  </div>

  <script>
    const form = document.getElementById('upload-form');
    const fileInput = document.getElementById('file-input');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const errorEl = document.getElementById('error');
    const container = document.getElementById('canvas-container');

    let currentImg = null;

    function resizeAndDraw() {
      const cw = container.clientWidth - 32;
      const ch = container.clientHeight - 32;

      if (!currentImg) {
        canvas.width = cw;
        canvas.height = ch;
        return;
      }

      const scale = Math.min(cw / currentImg.width, ch / currentImg.height, 1);
      const w = Math.round(currentImg.width * scale);
      const h = Math.round(currentImg.height * scale);

      canvas.width = w;
      canvas.height = h;
      ctx.drawImage(currentImg, 0, 0, w, h);
    }

    window.addEventListener('resize', resizeAndDraw);
    resizeAndDraw();

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.textContent = '';
      statusEl.textContent = '';

      const file = fileInput.files[0];
      if (!file) {
        errorEl.textContent = 'Please select a file.';
        return;
      }

      const formData = new FormData();
      formData.append('file', file);

      statusEl.textContent = 'Uploading\u2026';

      try {
        const res = await fetch('/upload', { method: 'POST', body: formData });
        const data = await res.json();

        if (!res.ok) {
          errorEl.textContent = data.error || 'Upload failed.';
          statusEl.textContent = '';
          return;
        }

        statusEl.textContent = 'Rendering\u2026';
        const img = new Image();
        img.onload = () => {
          currentImg = img;
          resizeAndDraw();
          statusEl.textContent = `${img.width}\u00d7${img.height} rendered`;
        };
        img.onerror = () => {
          errorEl.textContent = 'Failed to load image.';
          statusEl.textContent = '';
        };
        img.src = data.url;
      } catch (err) {
        errorEl.textContent = err.message;
        statusEl.textContent = '';
      }
    });

    // Drag-and-drop upload
    async function uploadAndRender(file) {
      errorEl.textContent = '';
      statusEl.textContent = 'Uploading\u2026';

      const formData = new FormData();
      formData.append('file', file);

      try {
        const res = await fetch('/upload', { method: 'POST', body: formData });
        const data = await res.json();

        if (!res.ok) {
          errorEl.textContent = data.error || 'Upload failed.';
          statusEl.textContent = '';
          return;
        }

        statusEl.textContent = 'Rendering\u2026';
        const img = new Image();
        img.onload = () => {
          currentImg = img;
          resizeAndDraw();
          statusEl.textContent = `${img.width}\u00d7${img.height} rendered`;
        };
        img.onerror = () => {
          errorEl.textContent = 'Failed to load image.';
          statusEl.textContent = '';
        };
        img.src = data.url;
      } catch (err) {
        errorEl.textContent = err.message;
        statusEl.textContent = '';
      }
    }

    let dragCounter = 0;

    container.addEventListener('dragenter', (e) => {
      e.preventDefault();
      dragCounter++;
      container.classList.add('dragover');
    });

    container.addEventListener('dragleave', (e) => {
      e.preventDefault();
      dragCounter--;
      if (dragCounter <= 0) {
        dragCounter = 0;
        container.classList.remove('dragover');
      }
    });

    container.addEventListener('dragover', (e) => {
      e.preventDefault();
    });

    container.addEventListener('drop', (e) => {
      e.preventDefault();
      dragCounter = 0;
      container.classList.remove('dragover');

      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) {
        uploadAndRender(file);
      } else {
        errorEl.textContent = 'Please drop an image file.';
      }
    });
  </script>
</body>
</html>
