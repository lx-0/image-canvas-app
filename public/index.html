<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Canvas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #e94560;
      letter-spacing: 0.5px;
    }

    #upload-form {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #file-input {
      font-size: 13px;
      color: #c0c0c0;
    }

    #file-input::file-selector-button {
      background: #0f3460;
      color: #e0e0e0;
      border: 1px solid #1a4a7a;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
    }

    #file-input::file-selector-button:hover {
      background: #1a4a7a;
    }

    button[type="submit"] {
      background: #e94560;
      color: #fff;
      border: none;
      padding: 7px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.2s;
    }

    button[type="submit"]:hover {
      background: #c73652;
    }

    #feedback {
      display: flex;
      gap: 16px;
      align-items: center;
      font-size: 13px;
      min-width: 0;
    }

    #status { color: #8a8a9a; }
    #error  { color: #e94560; }

    #main-area {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    #canvas-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      min-height: 0;
      background: #12122a;
    }

    canvas {
      display: block;
      border-radius: 4px;
      background: #0e0e1a;
      box-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }

    #canvas-container.dragover {
      background: #1a1a3e;
      outline: 3px dashed #e94560;
      outline-offset: -8px;
    }

    /* Chat Panel */
    #chat-panel {
      width: 360px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: #16213e;
      border-left: 1px solid #0f3460;
    }

    #chat-header {
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 600;
      color: #e94560;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #chat-header .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
    }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .chat-msg {
      max-width: 90%;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.5;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .chat-msg.user {
      align-self: flex-end;
      background: #0f3460;
      color: #e0e0e0;
      border-bottom-right-radius: 3px;
    }

    .chat-msg.assistant {
      align-self: flex-start;
      background: #1e2d4a;
      color: #d0d0e0;
      border-bottom-left-radius: 3px;
    }

    .chat-msg.system {
      align-self: center;
      background: transparent;
      color: #6a6a8a;
      font-size: 12px;
      font-style: italic;
      padding: 4px 8px;
    }

    .chat-msg .cmd-badge {
      display: inline-block;
      background: #e94560;
      color: #fff;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-bottom: 4px;
      font-weight: 600;
    }

    #chat-input-area {
      padding: 12px;
      border-top: 1px solid #0f3460;
      display: flex;
      gap: 8px;
    }

    #chat-input {
      flex: 1;
      background: #0e0e1a;
      border: 1px solid #1a4a7a;
      color: #e0e0e0;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      resize: none;
      outline: none;
      min-height: 38px;
      max-height: 100px;
    }

    #chat-input:focus {
      border-color: #e94560;
    }

    #chat-input::placeholder {
      color: #5a5a7a;
    }

    #chat-send {
      background: #e94560;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.2s;
      align-self: flex-end;
    }

    #chat-send:hover {
      background: #c73652;
    }

    #chat-send:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #chat-messages::-webkit-scrollbar {
      width: 6px;
    }

    #chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }

    #chat-messages::-webkit-scrollbar-thumb {
      background: #2a2a4a;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Image Canvas</h1>
    <form id="upload-form">
      <input type="file" id="file-input" accept="image/*" />
      <button type="submit">Upload</button>
    </form>
    <div id="feedback">
      <span id="status"></span>
      <span id="error"></span>
    </div>
  </header>

  <div id="main-area">
    <div id="canvas-container">
      <canvas id="canvas"></canvas>
    </div>

    <div id="chat-panel">
      <div id="chat-header">
        <span class="dot"></span>
        AI Assistant
      </div>
      <div id="chat-messages">
        <div class="chat-msg system">Upload an image, then ask me to edit it. I can crop, resize, rotate, add text, flip, adjust brightness/contrast, and more.</div>
      </div>
      <div id="chat-input-area">
        <textarea id="chat-input" placeholder="Ask me to edit the image…" rows="1"></textarea>
        <button id="chat-send">Send</button>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('upload-form');
    const fileInput = document.getElementById('file-input');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const errorEl = document.getElementById('error');
    const container = document.getElementById('canvas-container');
    const chatMessages = document.getElementById('chat-messages');
    const chatInput = document.getElementById('chat-input');
    const chatSend = document.getElementById('chat-send');

    let currentImg = null;
    let conversationHistory = [];

    function resizeAndDraw() {
      const cw = container.clientWidth - 32;
      const ch = container.clientHeight - 32;

      if (!currentImg) {
        canvas.width = cw;
        canvas.height = ch;
        return;
      }

      const scale = Math.min(cw / currentImg.width, ch / currentImg.height, 1);
      const w = Math.round(currentImg.width * scale);
      const h = Math.round(currentImg.height * scale);

      canvas.width = w;
      canvas.height = h;
      ctx.drawImage(currentImg, 0, 0, w, h);
    }

    window.addEventListener('resize', resizeAndDraw);
    resizeAndDraw();

    // Upload via form
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.textContent = '';
      statusEl.textContent = '';

      const file = fileInput.files[0];
      if (!file) {
        errorEl.textContent = 'Please select a file.';
        return;
      }

      const formData = new FormData();
      formData.append('file', file);

      statusEl.textContent = 'Uploading\u2026';

      try {
        const res = await fetch('/upload', { method: 'POST', body: formData });
        const data = await res.json();

        if (!res.ok) {
          errorEl.textContent = data.error || 'Upload failed.';
          statusEl.textContent = '';
          return;
        }

        statusEl.textContent = 'Rendering\u2026';
        const img = new Image();
        img.onload = () => {
          currentImg = img;
          resizeAndDraw();
          statusEl.textContent = `${img.width}\u00d7${img.height} rendered`;
          addSystemMessage('Image loaded. You can now ask me to edit it.');
        };
        img.onerror = () => {
          errorEl.textContent = 'Failed to load image.';
          statusEl.textContent = '';
        };
        img.src = data.url;
      } catch (err) {
        errorEl.textContent = err.message;
        statusEl.textContent = '';
      }
    });

    // Drag-and-drop upload
    async function uploadAndRender(file) {
      errorEl.textContent = '';
      statusEl.textContent = 'Uploading\u2026';

      const formData = new FormData();
      formData.append('file', file);

      try {
        const res = await fetch('/upload', { method: 'POST', body: formData });
        const data = await res.json();

        if (!res.ok) {
          errorEl.textContent = data.error || 'Upload failed.';
          statusEl.textContent = '';
          return;
        }

        statusEl.textContent = 'Rendering\u2026';
        const img = new Image();
        img.onload = () => {
          currentImg = img;
          resizeAndDraw();
          statusEl.textContent = `${img.width}\u00d7${img.height} rendered`;
          addSystemMessage('Image loaded. You can now ask me to edit it.');
        };
        img.onerror = () => {
          errorEl.textContent = 'Failed to load image.';
          statusEl.textContent = '';
        };
        img.src = data.url;
      } catch (err) {
        errorEl.textContent = err.message;
        statusEl.textContent = '';
      }
    }

    let dragCounter = 0;

    container.addEventListener('dragenter', (e) => {
      e.preventDefault();
      dragCounter++;
      container.classList.add('dragover');
    });

    container.addEventListener('dragleave', (e) => {
      e.preventDefault();
      dragCounter--;
      if (dragCounter <= 0) {
        dragCounter = 0;
        container.classList.remove('dragover');
      }
    });

    container.addEventListener('dragover', (e) => {
      e.preventDefault();
    });

    container.addEventListener('drop', (e) => {
      e.preventDefault();
      dragCounter = 0;
      container.classList.remove('dragover');

      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) {
        uploadAndRender(file);
      } else {
        errorEl.textContent = 'Please drop an image file.';
      }
    });

    // Chat functionality
    function addChatMessage(role, text, hadCommands) {
      const div = document.createElement('div');
      div.className = `chat-msg ${role}`;
      if (hadCommands && role === 'assistant') {
        const badge = document.createElement('span');
        badge.className = 'cmd-badge';
        badge.textContent = 'APPLIED';
        div.appendChild(badge);
        div.appendChild(document.createElement('br'));
      }
      div.appendChild(document.createTextNode(text));
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function addSystemMessage(text) {
      const div = document.createElement('div');
      div.className = 'chat-msg system';
      div.textContent = text;
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function getCanvasDataURL() {
      if (!currentImg) return null;
      try {
        return canvas.toDataURL('image/png');
      } catch (_e) {
        return null;
      }
    }

    // Canvas manipulation commands
    function executeCommands(commands) {
      if (!currentImg || !commands || !Array.isArray(commands)) return;

      for (const cmd of commands) {
        switch (cmd.action) {
          case 'crop':
            executeCrop(cmd);
            break;
          case 'resize':
            executeResize(cmd);
            break;
          case 'rotate':
            executeRotate(cmd);
            break;
          case 'addText':
            executeAddText(cmd);
            break;
          case 'flip':
            executeFlip(cmd);
            break;
          case 'grayscale':
            executeGrayscale();
            break;
          case 'brightness':
            executeBrightness(cmd);
            break;
          case 'contrast':
            executeContrast(cmd);
            break;
        }
      }

      // Snapshot the canvas as the new currentImg
      const snapshot = new Image();
      snapshot.onload = () => {
        currentImg = snapshot;
        statusEl.textContent = `${currentImg.width}\u00d7${currentImg.height} rendered`;
      };
      snapshot.src = canvas.toDataURL('image/png');
    }

    function executeCrop(cmd) {
      const sx = Math.round((cmd.x / 100) * canvas.width);
      const sy = Math.round((cmd.y / 100) * canvas.height);
      const sw = Math.round((cmd.width / 100) * canvas.width);
      const sh = Math.round((cmd.height / 100) * canvas.height);

      const imageData = ctx.getImageData(sx, sy, sw, sh);
      canvas.width = sw;
      canvas.height = sh;
      ctx.putImageData(imageData, 0, 0);
    }

    function executeResize(cmd) {
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = canvas.width;
      tempCanvas.height = canvas.height;
      tempCanvas.getContext('2d').drawImage(canvas, 0, 0);

      let newW, newH;
      if (cmd.scale) {
        newW = Math.round(canvas.width * cmd.scale);
        newH = Math.round(canvas.height * cmd.scale);
      } else {
        newW = cmd.width;
        newH = cmd.height;
      }

      canvas.width = newW;
      canvas.height = newH;
      ctx.drawImage(tempCanvas, 0, 0, newW, newH);
    }

    function executeRotate(cmd) {
      const deg = cmd.degrees;
      const rad = (deg * Math.PI) / 180;
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = canvas.width;
      tempCanvas.height = canvas.height;
      tempCanvas.getContext('2d').drawImage(canvas, 0, 0);

      if (deg === 90 || deg === 270 || deg === -90 || deg === -270) {
        canvas.width = tempCanvas.height;
        canvas.height = tempCanvas.width;
      } else if (deg === 180 || deg === -180) {
        canvas.width = tempCanvas.width;
        canvas.height = tempCanvas.height;
      }

      ctx.save();
      ctx.translate(canvas.width / 2, canvas.height / 2);
      ctx.rotate(rad);
      ctx.drawImage(tempCanvas, -tempCanvas.width / 2, -tempCanvas.height / 2);
      ctx.restore();
    }

    function executeAddText(cmd) {
      const x = (cmd.x / 100) * canvas.width;
      const y = (cmd.y / 100) * canvas.height;
      const fontSize = cmd.fontSize || 24;
      const color = cmd.color || 'white';
      const font = cmd.font || 'sans-serif';

      ctx.save();
      ctx.font = `${fontSize}px ${font}`;
      ctx.fillStyle = color;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // Text shadow for readability
      ctx.shadowColor = 'rgba(0,0,0,0.7)';
      ctx.shadowBlur = 4;
      ctx.shadowOffsetX = 1;
      ctx.shadowOffsetY = 1;

      ctx.fillText(cmd.text, x, y);
      ctx.restore();
    }

    function executeFlip(cmd) {
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = canvas.width;
      tempCanvas.height = canvas.height;
      tempCanvas.getContext('2d').drawImage(canvas, 0, 0);

      ctx.save();
      if (cmd.direction === 'horizontal') {
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
      } else {
        ctx.translate(0, canvas.height);
        ctx.scale(1, -1);
      }
      ctx.drawImage(tempCanvas, 0, 0);
      ctx.restore();
    }

    function executeGrayscale() {
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;
      for (let i = 0; i < data.length; i += 4) {
        const avg = data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114;
        data[i] = data[i + 1] = data[i + 2] = avg;
      }
      ctx.putImageData(imageData, 0, 0);
    }

    function executeBrightness(cmd) {
      const val = cmd.value;
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;
      const factor = (val / 100) * 255;
      for (let i = 0; i < data.length; i += 4) {
        data[i] = Math.max(0, Math.min(255, data[i] + factor));
        data[i + 1] = Math.max(0, Math.min(255, data[i + 1] + factor));
        data[i + 2] = Math.max(0, Math.min(255, data[i + 2] + factor));
      }
      ctx.putImageData(imageData, 0, 0);
    }

    function executeContrast(cmd) {
      const val = cmd.value;
      const factor = (259 * (val + 255)) / (255 * (259 - val));
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;
      for (let i = 0; i < data.length; i += 4) {
        data[i] = Math.max(0, Math.min(255, factor * (data[i] - 128) + 128));
        data[i + 1] = Math.max(0, Math.min(255, factor * (data[i + 1] - 128) + 128));
        data[i + 2] = Math.max(0, Math.min(255, factor * (data[i + 2] - 128) + 128));
      }
      ctx.putImageData(imageData, 0, 0);
    }

    // Send chat message
    async function sendMessage() {
      const text = chatInput.value.trim();
      if (!text) return;

      addChatMessage('user', text);
      chatInput.value = '';
      chatSend.disabled = true;

      conversationHistory.push({ role: 'user', content: text });

      try {
        const body = {
          messages: conversationHistory,
          imageData: getCanvasDataURL(),
        };

        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        const data = await res.json();

        if (!res.ok) {
          addSystemMessage(data.error || 'Chat request failed.');
          conversationHistory.pop();
          chatSend.disabled = false;
          return;
        }

        const responseText = data.response || '(no response)';
        conversationHistory.push({ role: 'assistant', content: responseText });

        if (data.commands && data.commands.length > 0) {
          executeCommands(data.commands);
          addChatMessage('assistant', responseText, true);
        } else {
          addChatMessage('assistant', responseText, false);
        }
      } catch (err) {
        addSystemMessage('Error: ' + err.message);
        conversationHistory.pop();
      }

      chatSend.disabled = false;
      chatInput.focus();
    }

    chatSend.addEventListener('click', sendMessage);

    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Auto-resize textarea
    chatInput.addEventListener('input', () => {
      chatInput.style.height = 'auto';
      chatInput.style.height = Math.min(chatInput.scrollHeight, 100) + 'px';
    });
  </script>
</body>
</html>
