<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Canvas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #e94560;
      letter-spacing: 0.5px;
    }

    #upload-form {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #file-input {
      font-size: 13px;
      color: #c0c0c0;
    }

    #file-input::file-selector-button {
      background: #0f3460;
      color: #e0e0e0;
      border: 1px solid #1a4a7a;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
    }

    #file-input::file-selector-button:hover {
      background: #1a4a7a;
    }

    button[type="submit"] {
      background: #e94560;
      color: #fff;
      border: none;
      padding: 7px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.2s;
    }

    button[type="submit"]:hover {
      background: #c73652;
    }

    #toolbar {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .toolbar-btn {
      background: #0f3460;
      color: #e0e0e0;
      border: 1px solid #1a4a7a;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .toolbar-btn:hover:not(:disabled) {
      background: #1a4a7a;
    }

    .toolbar-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .toolbar-btn .shortcut {
      font-size: 10px;
      opacity: 0.6;
    }

    /* Export dialog */
    #export-dialog-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    #export-dialog-overlay.visible {
      display: flex;
    }

    #export-dialog {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 10px;
      padding: 24px;
      width: 340px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    #export-dialog h2 {
      font-size: 16px;
      font-weight: 600;
      color: #e94560;
      margin-bottom: 16px;
    }

    .export-field {
      margin-bottom: 14px;
    }

    .export-field label {
      display: block;
      font-size: 12px;
      color: #8a8a9a;
      margin-bottom: 4px;
    }

    .export-field input[type="text"],
    .export-field select {
      width: 100%;
      background: #0e0e1a;
      border: 1px solid #1a4a7a;
      color: #e0e0e0;
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
    }

    .export-field input:focus,
    .export-field select:focus {
      border-color: #e94560;
    }

    .export-field .range-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .export-field input[type="range"] {
      flex: 1;
      accent-color: #e94560;
    }

    .export-field .range-value {
      font-size: 13px;
      color: #e0e0e0;
      min-width: 32px;
      text-align: right;
    }

    #export-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 18px;
    }

    #export-actions button {
      padding: 7px 18px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }

    #export-cancel-btn {
      background: #0f3460;
      color: #e0e0e0;
      border: 1px solid #1a4a7a;
    }

    #export-cancel-btn:hover {
      background: #1a4a7a;
    }

    #export-download-btn {
      background: #e94560;
      color: #fff;
    }

    #export-download-btn:hover {
      background: #c73652;
    }

    #feedback {
      display: flex;
      gap: 16px;
      align-items: center;
      font-size: 13px;
      min-width: 0;
    }

    #status { color: #8a8a9a; }
    #error  { color: #e94560; }

    #main-area {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    #canvas-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      min-height: 0;
      position: relative;
      background: #12122a;
    }

    canvas {
      display: block;
      border-radius: 4px;
      background: #0e0e1a;
      box-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }

    #canvas-container.dragover {
      background: #1a1a3e;
      outline: 3px dashed #e94560;
      outline-offset: -8px;
    }

    /* Chat Panel */
    #chat-panel {
      width: 360px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: #16213e;
      border-left: 1px solid #0f3460;
    }

    #chat-header {
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 600;
      color: #e94560;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #chat-header .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
    }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .chat-msg {
      max-width: 90%;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.5;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .chat-msg.user {
      align-self: flex-end;
      background: #0f3460;
      color: #e0e0e0;
      border-bottom-right-radius: 3px;
    }

    .chat-msg.assistant {
      align-self: flex-start;
      background: #1e2d4a;
      color: #d0d0e0;
      border-bottom-left-radius: 3px;
    }

    .chat-msg.system {
      align-self: center;
      background: transparent;
      color: #6a6a8a;
      font-size: 12px;
      font-style: italic;
      padding: 4px 8px;
    }

    .chat-msg .cmd-badge {
      display: inline-block;
      background: #e94560;
      color: #fff;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-bottom: 4px;
      font-weight: 600;
    }

    #chat-input-area {
      padding: 12px;
      border-top: 1px solid #0f3460;
      display: flex;
      gap: 8px;
    }

    #chat-input {
      flex: 1;
      background: #0e0e1a;
      border: 1px solid #1a4a7a;
      color: #e0e0e0;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      resize: none;
      outline: none;
      min-height: 38px;
      max-height: 100px;
    }

    #chat-input:focus {
      border-color: #e94560;
    }

    #chat-input::placeholder {
      color: #5a5a7a;
    }

    #chat-send {
      background: #e94560;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.2s;
      align-self: flex-end;
    }

    #chat-send:hover {
      background: #c73652;
    }

    #chat-send:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #chat-input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #chat-messages::-webkit-scrollbar {
      width: 6px;
    }

    #chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }

    #chat-messages::-webkit-scrollbar-thumb {
      background: #2a2a4a;
      border-radius: 3px;
    }

    /* Upload progress bar */
    #upload-progress {
      display: none;
      width: 120px;
      height: 6px;
      background: #0e0e1a;
      border-radius: 3px;
      overflow: hidden;
    }

    #upload-progress.visible {
      display: block;
    }

    #upload-progress-bar {
      height: 100%;
      width: 0%;
      background: #e94560;
      border-radius: 3px;
      transition: width 0.15s ease;
    }

    /* Canvas overlay spinner */
    #canvas-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(10, 10, 26, 0.7);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      border-radius: 4px;
      z-index: 10;
    }

    #canvas-overlay.visible {
      display: flex;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #1a4a7a;
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #canvas-overlay-text {
      color: #c0c0d0;
      font-size: 13px;
      font-weight: 500;
    }

    /* Chat typing indicator */
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 10px 14px;
      align-self: flex-start;
      background: #1e2d4a;
      border-radius: 10px;
      border-bottom-left-radius: 3px;
    }

    .typing-indicator span {
      width: 6px;
      height: 6px;
      background: #6a6a8a;
      border-radius: 50%;
      animation: typingBounce 1.2s ease-in-out infinite;
    }

    .typing-indicator span:nth-child(2) {
      animation-delay: 0.15s;
    }

    .typing-indicator span:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-4px); opacity: 1; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Image Canvas</h1>
    <form id="upload-form">
      <input type="file" id="file-input" accept="image/*" />
      <button type="submit">Upload</button>
    </form>
    <div id="toolbar">
      <button id="undo-btn" class="toolbar-btn" disabled title="Undo (Ctrl+Z)">↩ Undo <span class="shortcut">Ctrl+Z</span></button>
      <button id="redo-btn" class="toolbar-btn" disabled title="Redo (Ctrl+Y)">↪ Redo <span class="shortcut">Ctrl+Y</span></button>
      <button id="save-btn" class="toolbar-btn" disabled title="Save/Download (Ctrl+S)">⬇ Save <span class="shortcut">Ctrl+S</span></button>
    </div>
    <div id="feedback">
      <span id="status"></span>
      <div id="upload-progress"><div id="upload-progress-bar"></div></div>
      <span id="error"></span>
    </div>
  </header>

  <div id="main-area">
    <div id="canvas-container">
      <canvas id="canvas"></canvas>
      <div id="canvas-overlay">
        <div class="spinner"></div>
        <span id="canvas-overlay-text">Processing…</span>
      </div>
    </div>

    <div id="chat-panel">
      <div id="chat-header">
        <span class="dot"></span>
        AI Assistant
      </div>
      <div id="chat-messages">
        <div class="chat-msg system">Upload an image, then ask me to edit it. I can crop, resize, rotate, add text, flip, adjust brightness/contrast, and more.</div>
      </div>
      <div id="chat-input-area">
        <textarea id="chat-input" placeholder="Ask me to edit the image…" rows="1"></textarea>
        <button id="chat-send">Send</button>
      </div>
    </div>
  </div>

  <div id="export-dialog-overlay">
    <div id="export-dialog">
      <h2>Export Image</h2>
      <div class="export-field">
        <label for="export-filename">Filename</label>
        <input type="text" id="export-filename" />
      </div>
      <div class="export-field">
        <label for="export-format">Format</label>
        <select id="export-format">
          <option value="png">PNG (lossless)</option>
          <option value="jpeg">JPEG</option>
        </select>
      </div>
      <div class="export-field" id="quality-field" style="display:none;">
        <label for="export-quality">JPEG Quality</label>
        <div class="range-row">
          <input type="range" id="export-quality" min="1" max="100" value="92" />
          <span class="range-value" id="quality-value">92</span>
        </div>
      </div>
      <div id="export-actions">
        <button id="export-cancel-btn">Cancel</button>
        <button id="export-download-btn">Download</button>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('upload-form');
    const fileInput = document.getElementById('file-input');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const errorEl = document.getElementById('error');
    const container = document.getElementById('canvas-container');
    const chatMessages = document.getElementById('chat-messages');
    const chatInput = document.getElementById('chat-input');
    const chatSend = document.getElementById('chat-send');

    const undoBtn = document.getElementById('undo-btn');
    const redoBtn = document.getElementById('redo-btn');
    const saveBtn = document.getElementById('save-btn');

    // Loading indicator elements
    const uploadProgress = document.getElementById('upload-progress');
    const uploadProgressBar = document.getElementById('upload-progress-bar');
    const canvasOverlay = document.getElementById('canvas-overlay');
    const canvasOverlayText = document.getElementById('canvas-overlay-text');

    function showUploadProgress(pct) {
      uploadProgress.classList.add('visible');
      uploadProgressBar.style.width = pct + '%';
    }

    function hideUploadProgress() {
      uploadProgress.classList.remove('visible');
      uploadProgressBar.style.width = '0%';
    }

    function showCanvasOverlay(text) {
      canvasOverlayText.textContent = text || 'Processing…';
      canvasOverlay.classList.add('visible');
    }

    function hideCanvasOverlay() {
      canvasOverlay.classList.remove('visible');
    }

    function addTypingIndicator() {
      const div = document.createElement('div');
      div.className = 'typing-indicator';
      div.id = 'typing-indicator';
      div.innerHTML = '<span></span><span></span><span></span>';
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      return div;
    }

    function removeTypingIndicator() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    function uploadWithProgress(formData) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/upload');
        xhr.upload.addEventListener('progress', (e) => {
          if (e.lengthComputable) {
            showUploadProgress(Math.round((e.loaded / e.total) * 100));
          }
        });
        xhr.addEventListener('load', () => {
          hideUploadProgress();
          try {
            const data = JSON.parse(xhr.responseText);
            if (xhr.status >= 200 && xhr.status < 300) {
              resolve(data);
            } else {
              reject(new Error(data.error || 'Upload failed.'));
            }
          } catch (_e) {
            reject(new Error('Upload failed.'));
          }
        });
        xhr.addEventListener('error', () => {
          hideUploadProgress();
          reject(new Error('Upload failed.'));
        });
        xhr.send(formData);
      });
    }

    function setChatEnabled(enabled) {
      chatSend.disabled = !enabled;
      chatInput.disabled = !enabled;
      if (enabled) chatInput.focus();
    }

    // Export dialog elements
    const exportOverlay = document.getElementById('export-dialog-overlay');
    const exportFilename = document.getElementById('export-filename');
    const exportFormat = document.getElementById('export-format');
    const exportQuality = document.getElementById('export-quality');
    const qualityValue = document.getElementById('quality-value');
    const qualityField = document.getElementById('quality-field');
    const exportCancelBtn = document.getElementById('export-cancel-btn');
    const exportDownloadBtn = document.getElementById('export-download-btn');

    let currentImg = null;
    let conversationHistory = [];

    // Undo/Redo history stack
    const MAX_HISTORY = 20;
    let historyStack = [];  // array of data URL strings
    let historyIndex = -1;  // pointer to current state in stack

    function saveState() {
      if (!currentImg) return;
      const dataURL = canvas.toDataURL('image/png');
      // Discard any redo states ahead of current position
      historyStack = historyStack.slice(0, historyIndex + 1);
      historyStack.push(dataURL);
      // Enforce stack limit
      if (historyStack.length > MAX_HISTORY) {
        historyStack.shift();
      }
      historyIndex = historyStack.length - 1;
      updateUndoRedoButtons();
    }

    function undo() {
      if (historyIndex <= 0) return;
      historyIndex--;
      restoreState(historyStack[historyIndex]);
    }

    function redo() {
      if (historyIndex >= historyStack.length - 1) return;
      historyIndex++;
      restoreState(historyStack[historyIndex]);
    }

    function restoreState(dataURL) {
      const img = new Image();
      img.onload = () => {
        currentImg = img;
        resizeAndDraw();
        statusEl.textContent = `${img.width}×${img.height} rendered`;
        updateUndoRedoButtons();
      };
      img.src = dataURL;
    }

    function updateUndoRedoButtons() {
      undoBtn.disabled = historyIndex <= 0;
      redoBtn.disabled = historyIndex >= historyStack.length - 1;
      saveBtn.disabled = !currentImg;
    }

    undoBtn.addEventListener('click', undo);
    redoBtn.addEventListener('click', redo);

    function resizeAndDraw() {
      const cw = container.clientWidth - 32;
      const ch = container.clientHeight - 32;

      if (!currentImg) {
        canvas.width = cw;
        canvas.height = ch;
        return;
      }

      const scale = Math.min(cw / currentImg.width, ch / currentImg.height, 1);
      const w = Math.round(currentImg.width * scale);
      const h = Math.round(currentImg.height * scale);

      canvas.width = w;
      canvas.height = h;
      ctx.drawImage(currentImg, 0, 0, w, h);
    }

    window.addEventListener('resize', resizeAndDraw);
    resizeAndDraw();

    // Upload via form
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.textContent = '';
      statusEl.textContent = '';

      const file = fileInput.files[0];
      if (!file) {
        errorEl.textContent = 'Please select a file.';
        return;
      }

      const formData = new FormData();
      formData.append('file', file);

      statusEl.textContent = 'Uploading\u2026';
      showUploadProgress(0);

      try {
        const data = await uploadWithProgress(formData);

        statusEl.textContent = 'Rendering\u2026';
        const img = new Image();
        img.onload = () => {
          currentImg = img;
          resizeAndDraw();
          saveState();
          statusEl.textContent = `${img.width}\u00d7${img.height} rendered`;
          addSystemMessage('Image loaded. You can now ask me to edit it.');
        };
        img.onerror = () => {
          errorEl.textContent = 'Failed to load image.';
          statusEl.textContent = '';
        };
        img.src = data.url;
      } catch (err) {
        errorEl.textContent = err.message;
        statusEl.textContent = '';
        hideUploadProgress();
      }
    });

    // Drag-and-drop upload
    async function uploadAndRender(file) {
      errorEl.textContent = '';
      statusEl.textContent = 'Uploading\u2026';
      showUploadProgress(0);

      const formData = new FormData();
      formData.append('file', file);

      try {
        const data = await uploadWithProgress(formData);

        statusEl.textContent = 'Rendering\u2026';
        const img = new Image();
        img.onload = () => {
          currentImg = img;
          resizeAndDraw();
          saveState();
          statusEl.textContent = `${img.width}\u00d7${img.height} rendered`;
          addSystemMessage('Image loaded. You can now ask me to edit it.');
        };
        img.onerror = () => {
          errorEl.textContent = 'Failed to load image.';
          statusEl.textContent = '';
        };
        img.src = data.url;
      } catch (err) {
        errorEl.textContent = err.message;
        statusEl.textContent = '';
        hideUploadProgress();
      }
    }

    let dragCounter = 0;

    container.addEventListener('dragenter', (e) => {
      e.preventDefault();
      dragCounter++;
      container.classList.add('dragover');
    });

    container.addEventListener('dragleave', (e) => {
      e.preventDefault();
      dragCounter--;
      if (dragCounter <= 0) {
        dragCounter = 0;
        container.classList.remove('dragover');
      }
    });

    container.addEventListener('dragover', (e) => {
      e.preventDefault();
    });

    container.addEventListener('drop', (e) => {
      e.preventDefault();
      dragCounter = 0;
      container.classList.remove('dragover');

      const file = e.dataTransfer.files[0];
      if (!file || !file.type.startsWith('image/')) {
        errorEl.textContent = 'Please drop an image file.';
        return;
      }

      // If no base image exists, just load normally
      if (!currentImg) {
        uploadAndRender(file);
        return;
      }

      // Base image exists — trigger AI compositing
      const shiftHeld = e.shiftKey;
      let instructions = null;

      if (shiftHeld) {
        instructions = prompt('Enter compositing instructions (or cancel for automatic):');
        if (instructions !== null && instructions.trim() === '') {
          instructions = null;
        }
      }

      compositeImages(file, instructions);
    });

    // AI compositing
    function fileToDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function compositeImages(droppedFile, instructions) {
      errorEl.textContent = '';
      statusEl.textContent = 'AI compositing…';
      showCanvasOverlay('Processing…');
      addSystemMessage('Analyzing images for compositing…');

      try {
        const baseImage = canvas.toDataURL('image/png');
        const droppedImage = await fileToDataURL(droppedFile);

        const body = { baseImage, droppedImage };
        if (instructions) body.instructions = instructions;

        const res = await fetch('/api/composite', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        const data = await res.json();

        if (!res.ok) {
          errorEl.textContent = data.error || 'Composite request failed.';
          statusEl.textContent = '';
          hideCanvasOverlay();
          return;
        }

        if (data.composite) {
          await renderComposite(droppedImage, data.composite);
          addSystemMessage(data.response || 'Compositing complete.');
        } else {
          addSystemMessage(data.response || 'AI could not determine placement.');
          statusEl.textContent = '';
        }
        hideCanvasOverlay();
      } catch (err) {
        errorEl.textContent = 'Compositing error: ' + err.message;
        statusEl.textContent = '';
        hideCanvasOverlay();
      }
    }

    async function renderComposite(droppedDataURL, composite) {
      return new Promise((resolve) => {
        const droppedImg = new Image();
        droppedImg.onload = () => {
          const targetWidth = canvas.width * composite.scale;
          const aspectRatio = droppedImg.height / droppedImg.width;
          const targetHeight = targetWidth * aspectRatio;

          const cx = (composite.x / 100) * canvas.width;
          const cy = (composite.y / 100) * canvas.height;

          ctx.drawImage(
            droppedImg,
            cx - targetWidth / 2,
            cy - targetHeight / 2,
            targetWidth,
            targetHeight
          );

          // Snapshot as new currentImg
          const snapshot = new Image();
          snapshot.onload = () => {
            currentImg = snapshot;
            saveState();
            statusEl.textContent = `${currentImg.width}×${currentImg.height} composited`;
            resolve();
          };
          snapshot.src = canvas.toDataURL('image/png');
        };
        droppedImg.src = droppedDataURL;
      });
    }

    // Chat functionality
    function addChatMessage(role, text, hadCommands) {
      const div = document.createElement('div');
      div.className = `chat-msg ${role}`;
      if (hadCommands && role === 'assistant') {
        const badge = document.createElement('span');
        badge.className = 'cmd-badge';
        badge.textContent = 'APPLIED';
        div.appendChild(badge);
        div.appendChild(document.createElement('br'));
      }
      div.appendChild(document.createTextNode(text));
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function addSystemMessage(text) {
      const div = document.createElement('div');
      div.className = 'chat-msg system';
      div.textContent = text;
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function getCanvasDataURL() {
      if (!currentImg) return null;
      try {
        return canvas.toDataURL('image/png');
      } catch (_e) {
        return null;
      }
    }

    // Canvas manipulation commands
    function executeCommands(commands) {
      if (!currentImg || !commands || !Array.isArray(commands)) return;

      for (const cmd of commands) {
        switch (cmd.action) {
          case 'crop':
            executeCrop(cmd);
            break;
          case 'resize':
            executeResize(cmd);
            break;
          case 'rotate':
            executeRotate(cmd);
            break;
          case 'addText':
            executeAddText(cmd);
            break;
          case 'flip':
            executeFlip(cmd);
            break;
          case 'grayscale':
            executeGrayscale();
            break;
          case 'brightness':
            executeBrightness(cmd);
            break;
          case 'contrast':
            executeContrast(cmd);
            break;
        }
      }

      // Snapshot the canvas as the new currentImg
      const snapshot = new Image();
      snapshot.onload = () => {
        currentImg = snapshot;
        saveState();
        statusEl.textContent = `${currentImg.width}\u00d7${currentImg.height} rendered`;
      };
      snapshot.src = canvas.toDataURL('image/png');
    }

    function executeCrop(cmd) {
      const sx = Math.round((cmd.x / 100) * canvas.width);
      const sy = Math.round((cmd.y / 100) * canvas.height);
      const sw = Math.round((cmd.width / 100) * canvas.width);
      const sh = Math.round((cmd.height / 100) * canvas.height);

      const imageData = ctx.getImageData(sx, sy, sw, sh);
      canvas.width = sw;
      canvas.height = sh;
      ctx.putImageData(imageData, 0, 0);
    }

    function executeResize(cmd) {
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = canvas.width;
      tempCanvas.height = canvas.height;
      tempCanvas.getContext('2d').drawImage(canvas, 0, 0);

      let newW, newH;
      if (cmd.scale) {
        newW = Math.round(canvas.width * cmd.scale);
        newH = Math.round(canvas.height * cmd.scale);
      } else {
        newW = cmd.width;
        newH = cmd.height;
      }

      canvas.width = newW;
      canvas.height = newH;
      ctx.drawImage(tempCanvas, 0, 0, newW, newH);
    }

    function executeRotate(cmd) {
      const deg = cmd.degrees;
      const rad = (deg * Math.PI) / 180;
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = canvas.width;
      tempCanvas.height = canvas.height;
      tempCanvas.getContext('2d').drawImage(canvas, 0, 0);

      if (deg === 90 || deg === 270 || deg === -90 || deg === -270) {
        canvas.width = tempCanvas.height;
        canvas.height = tempCanvas.width;
      } else if (deg === 180 || deg === -180) {
        canvas.width = tempCanvas.width;
        canvas.height = tempCanvas.height;
      }

      ctx.save();
      ctx.translate(canvas.width / 2, canvas.height / 2);
      ctx.rotate(rad);
      ctx.drawImage(tempCanvas, -tempCanvas.width / 2, -tempCanvas.height / 2);
      ctx.restore();
    }

    function executeAddText(cmd) {
      const x = (cmd.x / 100) * canvas.width;
      const y = (cmd.y / 100) * canvas.height;
      const fontSize = cmd.fontSize || 24;
      const color = cmd.color || 'white';
      const font = cmd.font || 'sans-serif';

      ctx.save();
      ctx.font = `${fontSize}px ${font}`;
      ctx.fillStyle = color;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // Text shadow for readability
      ctx.shadowColor = 'rgba(0,0,0,0.7)';
      ctx.shadowBlur = 4;
      ctx.shadowOffsetX = 1;
      ctx.shadowOffsetY = 1;

      ctx.fillText(cmd.text, x, y);
      ctx.restore();
    }

    function executeFlip(cmd) {
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = canvas.width;
      tempCanvas.height = canvas.height;
      tempCanvas.getContext('2d').drawImage(canvas, 0, 0);

      ctx.save();
      if (cmd.direction === 'horizontal') {
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
      } else {
        ctx.translate(0, canvas.height);
        ctx.scale(1, -1);
      }
      ctx.drawImage(tempCanvas, 0, 0);
      ctx.restore();
    }

    function executeGrayscale() {
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;
      for (let i = 0; i < data.length; i += 4) {
        const avg = data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114;
        data[i] = data[i + 1] = data[i + 2] = avg;
      }
      ctx.putImageData(imageData, 0, 0);
    }

    function executeBrightness(cmd) {
      const val = cmd.value;
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;
      const factor = (val / 100) * 255;
      for (let i = 0; i < data.length; i += 4) {
        data[i] = Math.max(0, Math.min(255, data[i] + factor));
        data[i + 1] = Math.max(0, Math.min(255, data[i + 1] + factor));
        data[i + 2] = Math.max(0, Math.min(255, data[i + 2] + factor));
      }
      ctx.putImageData(imageData, 0, 0);
    }

    function executeContrast(cmd) {
      const val = cmd.value;
      const factor = (259 * (val + 255)) / (255 * (259 - val));
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;
      for (let i = 0; i < data.length; i += 4) {
        data[i] = Math.max(0, Math.min(255, factor * (data[i] - 128) + 128));
        data[i + 1] = Math.max(0, Math.min(255, factor * (data[i + 1] - 128) + 128));
        data[i + 2] = Math.max(0, Math.min(255, factor * (data[i + 2] - 128) + 128));
      }
      ctx.putImageData(imageData, 0, 0);
    }

    // Export / Save functionality
    function getDefaultFilename() {
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, '0');
      const dd = String(now.getDate()).padStart(2, '0');
      return `image-canvas-${yyyy}-${mm}-${dd}`;
    }

    function openExportDialog() {
      if (!currentImg) return;
      exportFilename.value = getDefaultFilename();
      exportFormat.value = 'png';
      qualityField.style.display = 'none';
      exportQuality.value = 92;
      qualityValue.textContent = '92';
      exportOverlay.classList.add('visible');
      exportFilename.select();
    }

    function closeExportDialog() {
      exportOverlay.classList.remove('visible');
    }

    exportFormat.addEventListener('change', () => {
      qualityField.style.display = exportFormat.value === 'jpeg' ? '' : 'none';
    });

    exportQuality.addEventListener('input', () => {
      qualityValue.textContent = exportQuality.value;
    });

    exportCancelBtn.addEventListener('click', closeExportDialog);

    exportOverlay.addEventListener('click', (e) => {
      if (e.target === exportOverlay) closeExportDialog();
    });

    exportDownloadBtn.addEventListener('click', () => {
      if (!currentImg) return;

      const format = exportFormat.value;
      const mimeType = format === 'jpeg' ? 'image/jpeg' : 'image/png';
      const quality = format === 'jpeg' ? Number(exportQuality.value) / 100 : undefined;
      const filename = (exportFilename.value.trim() || getDefaultFilename()) + '.' + format;

      // Draw full-resolution image to an offscreen canvas for export
      const offscreen = document.createElement('canvas');
      offscreen.width = currentImg.width;
      offscreen.height = currentImg.height;
      offscreen.getContext('2d').drawImage(currentImg, 0, 0);

      offscreen.toBlob((blob) => {
        if (!blob) {
          errorEl.textContent = 'Export failed.';
          return;
        }
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        statusEl.textContent = `Exported ${filename}`;
        closeExportDialog();
      }, mimeType, quality);
    });

    saveBtn.addEventListener('click', openExportDialog);

    // Create a streaming chat message element that updates incrementally
    function addStreamingMessage() {
      const div = document.createElement('div');
      div.className = 'chat-msg assistant';
      const textNode = document.createTextNode('');
      div.appendChild(textNode);
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      return { div, textNode };
    }

    // Parse SSE lines from a text chunk, handling partial lines across chunks
    function createSSEParser(onEvent) {
      let buffer = '';
      return function feed(chunk) {
        buffer += chunk;
        const lines = buffer.split('\n');
        buffer = lines.pop(); // keep incomplete last line
        let eventType = null;
        for (const line of lines) {
          if (line.startsWith('event: ')) {
            eventType = line.slice(7);
          } else if (line.startsWith('data: ') && eventType) {
            try {
              onEvent(eventType, JSON.parse(line.slice(6)));
            } catch (_e) { /* skip malformed data */ }
            eventType = null;
          }
        }
      };
    }

    // Send chat message with streaming
    async function sendMessage() {
      const text = chatInput.value.trim();
      if (!text) return;

      addChatMessage('user', text);
      chatInput.value = '';
      setChatEnabled(false);
      addTypingIndicator();

      conversationHistory.push({ role: 'user', content: text });

      const body = {
        messages: conversationHistory,
        imageData: getCanvasDataURL(),
      };

      // Try streaming endpoint first
      try {
        const res = await fetch('/api/chat/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        if (!res.ok) {
          throw new Error('Stream endpoint returned ' + res.status);
        }

        removeTypingIndicator();
        const { div, textNode } = addStreamingMessage();
        let streamedText = '';
        let doneData = null;

        await new Promise((resolve, reject) => {
          const reader = res.body.getReader();
          const decoder = new TextDecoder();

          const parser = createSSEParser((event, data) => {
            if (event === 'delta') {
              streamedText += data.text;
              // Strip command tags from display during streaming
              const display = streamedText.replace(/<commands>[\s\S]*?(<\/commands>)?/g, '').trim();
              textNode.textContent = display;
              chatMessages.scrollTop = chatMessages.scrollHeight;
            } else if (event === 'done') {
              doneData = data;
            } else if (event === 'error') {
              reject(new Error(data.error || 'Stream error'));
            }
          });

          function pump() {
            reader.read().then(({ done, value }) => {
              if (done) return resolve();
              parser(decoder.decode(value, { stream: true }));
              pump();
            }).catch(reject);
          }
          pump();
        });

        if (doneData) {
          const responseText = doneData.response || '(no response)';
          textNode.textContent = responseText;
          conversationHistory.push({ role: 'assistant', content: responseText });

          if (doneData.commands && doneData.commands.length > 0) {
            executeCommands(doneData.commands);
            const badge = document.createElement('span');
            badge.className = 'cmd-badge';
            badge.textContent = 'APPLIED';
            div.insertBefore(document.createElement('br'), div.firstChild);
            div.insertBefore(badge, div.firstChild);
          }
        } else {
          // Stream ended without done event — use what we have
          const display = streamedText.replace(/<commands>[\s\S]*?<\/commands>\s*/g, '').trim();
          textNode.textContent = display || '(no response)';
          conversationHistory.push({ role: 'assistant', content: display || '' });
        }
      } catch (streamErr) {
        // Fallback to non-streaming endpoint
        removeTypingIndicator();
        addTypingIndicator();
        try {
          const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });

          const data = await res.json();

          if (!res.ok) {
            removeTypingIndicator();
            addSystemMessage(data.error || 'Chat request failed.');
            conversationHistory.pop();
            setChatEnabled(true);
            return;
          }

          const responseText = data.response || '(no response)';
          conversationHistory.push({ role: 'assistant', content: responseText });

          removeTypingIndicator();
          if (data.commands && data.commands.length > 0) {
            executeCommands(data.commands);
            addChatMessage('assistant', responseText, true);
          } else {
            addChatMessage('assistant', responseText, false);
          }
        } catch (fallbackErr) {
          removeTypingIndicator();
          addSystemMessage('Error: ' + fallbackErr.message);
          conversationHistory.pop();
        }
      }

      setChatEnabled(true);
    }

    chatSend.addEventListener('click', sendMessage);

    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
        e.preventDefault();
        undo();
      }
      if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) {
        e.preventDefault();
        redo();
      }
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        openExportDialog();
      }
      if (e.key === 'Escape' && exportOverlay.classList.contains('visible')) {
        closeExportDialog();
      }
    });

    // Auto-resize textarea
    chatInput.addEventListener('input', () => {
      chatInput.style.height = 'auto';
      chatInput.style.height = Math.min(chatInput.scrollHeight, 100) + 'px';
    });
  </script>
</body>
</html>
