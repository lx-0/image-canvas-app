<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Image Canvas App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem;
    }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #f8fafc; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 1.25rem;
    }
    .stat-card .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #94a3b8;
      margin-bottom: 0.5rem;
    }
    .stat-card .value {
      font-size: 1.75rem;
      font-weight: 700;
      color: #f8fafc;
    }
    .stat-card .unit {
      font-size: 0.875rem;
      color: #64748b;
      margin-left: 0.25rem;
    }
    .error {
      background: #450a0a;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      padding: 1rem;
      border-radius: 8px;
    }
    .refresh-btn {
      background: #334155;
      color: #e2e8f0;
      border: 1px solid #475569;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.875rem;
      margin-bottom: 1.5rem;
    }
    .refresh-btn:hover { background: #475569; }
    .meta {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <h1>Image Canvas App &mdash; Admin Dashboard</h1>
  <button class="refresh-btn" onclick="loadStats()">Refresh</button>
  <div id="content">Loading...</div>
  <div id="meta" class="meta"></div>

  <script>
    function formatBytes(bytes) {
      if (bytes === 0) return '0 B';
      const units = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(1024));
      return (bytes / Math.pow(1024, i)).toFixed(1) + ' ' + units[i];
    }

    function formatUptime(seconds) {
      const d = Math.floor(seconds / 86400);
      const h = Math.floor((seconds % 86400) / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = seconds % 60;
      const parts = [];
      if (d > 0) parts.push(d + 'd');
      if (h > 0) parts.push(h + 'h');
      if (m > 0) parts.push(m + 'm');
      parts.push(s + 's');
      return parts.join(' ');
    }

    async function loadStats() {
      const content = document.getElementById('content');
      const meta = document.getElementById('meta');
      try {
        const res = await fetch('/api/stats');
        if (!res.ok) throw new Error('Failed to fetch stats: ' + res.status);
        const data = await res.json();

        content.innerHTML = `
          <div class="stats-grid">
            <div class="stat-card">
              <div class="label">Total Images</div>
              <div class="value">${data.totalImages}</div>
            </div>
            <div class="stat-card">
              <div class="label">Disk Usage</div>
              <div class="value">${formatBytes(data.totalDiskUsageBytes)}</div>
            </div>
            <div class="stat-card">
              <div class="label">Conversations</div>
              <div class="value">${data.totalConversations}</div>
            </div>
            <div class="stat-card">
              <div class="label">Edits</div>
              <div class="value">${data.totalEdits}</div>
            </div>
            <div class="stat-card">
              <div class="label">Requests Served</div>
              <div class="value">${data.requestCount.toLocaleString()}</div>
            </div>
            <div class="stat-card">
              <div class="label">Uptime</div>
              <div class="value">${formatUptime(data.uptimeSeconds)}</div>
            </div>
          </div>
        `;
        meta.textContent = 'Server started: ' + data.serverStartedAt + ' | Last refreshed: ' + new Date().toISOString();
      } catch (err) {
        content.innerHTML = '<div class="error">' + err.message + '</div>';
      }
    }

    loadStats();
    setInterval(loadStats, 30000);
  </script>
</body>
</html>
